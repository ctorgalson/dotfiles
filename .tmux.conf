# Modified version of .tmux.conf from the awesome book  "tmux: Productive
# Mouse-Free Development"
#
# https://pragprog.com/book/bhtmux/tmux
#
# Remap prfix to CTRL-a:
set -g prefix C-a
# Free up CTRL-b:
unbind C-b
# Reduce escape-time for Vim's benefit:
set -s escape-time 1
# Base both window and pane indexes at 1 (instead of zero):
set -g base-index 1
setw -g pane-base-index 1
# Shortcut for tmux 'source-file':
bind r source-file ~/.tmux.conf\; display "Reloaded!"
# Make sure CTRL-a can still be used elsewhere:
bind C-a send-prefix
# Build in shortcuts for horizontal and vertical splits:
bind | split-window -h
bind - split-window -v
# Imitate Vim navigation:
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
# Home-row friendly keybindings for cycling through windows:
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+
# Vim-movement-like pane resizing:
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
# Mouse mode--comment out first line and remove subsequent comments to enable:
setw -g mode-mouse off
#setw -g mode-mouse on
## Enable mouse for selecting windows and panes and resizing panes:
#set -g mouse-select-pane on
#set -g mouse-resize-pane on
#set -g mouse-select-window on
# Colours:
set -g default-terminal "screen-256color"
#### COLOUR (Solarized dark)
#
# Solarized dark colour scheme for tmux. Awesome.
# https://github.com/seebi/tmux-colors-solarized/blob/master/tmuxcolors-dark.conf
#
# default statusbar colors
set-option -g status-bg colour235 #base02
set-option -g status-fg colour130 #yellow
set-option -g status-attr default
# default window title colors
set-window-option -g window-status-fg colour33 #base0
set-window-option -g window-status-bg default
#set-window-option -g window-status-attr dim
# active window title colors
set-window-option -g window-status-current-fg colour196 #orange
set-window-option -g window-status-current-bg default
#set-window-option -g window-status-current-attr bright
# pane border
set-option -g pane-border-fg colour235 #base02
set-option -g pane-active-border-fg colour46 #base01
# message text
set-option -g message-bg colour235 #base02
set-option -g message-fg colour196 #orange
# pane number display
set-option -g display-panes-active-colour colour20 #blue
set-option -g display-panes-colour colour196 #orange
# clock
set-window-option -g clock-mode-colour colour40 #green

